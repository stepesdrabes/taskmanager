name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-26 # Apple Silicon + Xcode 26 (macOS 26 SDK) by default
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: swift build
